name: NodeJS with Webpack

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build
      run: |
        npm install
        npx webpack

  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Build bundle
      run: |
        npm ci
        npx webpack

    - name: Upload webpack bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: simple-weather-card-bundle
        path: simple-weather-card-bundle.js

    - name: Create GitHub release with bundle
      uses: softprops/action-gh-release@v2
      with:
        files: simple-weather-card-bundle.js

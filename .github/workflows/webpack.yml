name: NodeJS with Webpack

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build
      run: |
        npm install
        npx webpack

    - name: Upload webpack bundle artifact
      if: github.event_name == 'push' && matrix.node-version == '22.x'
      uses: actions/upload-artifact@v4
      with:
        name: simple-weather-card-bundle
        path: simple-weather-card-bundle.js

  package-and-release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download webpack bundle artifact
      uses: actions/download-artifact@v4.1.3
      with:
        name: simple-weather-card-bundle
        path: .

    - name: Create GitHub release with bundle
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('build-{0}', github.run_number) }}
        files: simple-weather-card-bundle.js
